# general
set -g status on
set -g pane-base-index 1
set -g base-index 1
set -g set-titles on
set -g default-terminal "screen-256color"
set-option -g set-titles-string '#{pane_current_command}'
set-option -g history-limit 10000
set-option -g status-position top
set-option -g renumber-windows on
set-window-option -g monitor-activity off
set -g default-terminal "tmux"

# mouse
set -g mouse on
#bind -T root WheelUpPane   if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; copy-mode -e; send-keys -M"
#bind -T root WheelDownPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; send-keys -M"
# copy/paste with mouse
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M
bind -n C-WheelUpPane select-pane -t= \; copy-mode -e \; send-keys -M
bind -T copy-mode-vi    C-WheelUpPane   send-keys -X halfpage-up
bind -T copy-mode-vi    C-WheelDownPane send-keys -X halfpage-down
bind -T copy-mode-emacs C-WheelUpPane   send-keys -X halfpage-up
bind -T copy-mode-emacs C-WheelDownPane send-keys -X halfpage-down

# To copy, left click and drag to highlight text in yellow,
# once you release left click yellow text will disappear and will automatically be available in clibboard
# # Use vim keybindings in copy mode
# Update default binding of `Enter` to also use copy-pipe
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection c"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# vim mode
setw -g mode-keys vi

# prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# activity
setw -g monitor-activity on
set-option -g visual-activity off

# statusbar
set -g status-left ''
set -g status-right ''
set -g status-bg default
set -g window-status-activity-attr 'none'
set -g window-status-activity-bg 'colour238'
set -g window-status-activity-fg 'colour11'

# status colors
set -g message-style 'fg=white,bg=blue'

set -g window-status-current-style "fg=colour238 bg=colour11"
set -g window-status-style "fg=white bg=colour238"
set -g window-status-format "  #W#{?window_zoomed_flag,.Z,}  "
set -g window-status-current-format "  #W#{?window_zoomed_flag,.Z,}  "
set -g window-status-separator " "
set -g pane-active-border-style "fg=colour11"
set -g pane-border-style "fg=white"

# previous pane
bind -r i select-pane -t:.-
